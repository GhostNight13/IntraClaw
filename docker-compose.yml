version: '3.9'

# ┌──────────────────────────────────────────────────────────────┐
# │  IntraClaw — simple single-container deployment               │
# │  Usage: docker compose up -d                                   │
# │                                                                │
# │  SQLite for everything — perfect for solo / small team use.    │
# │  For multi-user Postgres+Redis+Chroma, see                     │
# │  docker-compose.full.yml (copy from docker-compose.yml.full).  │
# └──────────────────────────────────────────────────────────────┘

services:
  intraclaw:
    build: .
    image: intraclaw:latest
    container_name: intraclaw
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      # SQLite DB, cache, autonomous state
      - ./data:/app/data
      # User profile, SOUL.md, learned memory
      - ./memory:/app/memory
      # Static skills
      - ./skills:/app/skills
      # Log files (rotated daily)
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
