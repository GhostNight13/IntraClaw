<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1500px; height: 500px; overflow: hidden; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .canvas {
    width: 1500px;
    height: 500px;
    position: relative;
    background: #050508;
    overflow: hidden;
  }

  /* Background glow */
  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 120% at 15% 50%, rgba(43,127,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 100% at 85% 50%, rgba(61,220,132,0.06) 0%, transparent 60%);
  }

  /* Horizontal lines */
  .lines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 49px,
      rgba(43,127,255,0.05) 49px,
      rgba(43,127,255,0.05) 50px
    );
  }

  /* Left — logo zone */
  .left {
    position: absolute;
    left: 100px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .claw-svg {
    filter: drop-shadow(0 0 16px rgba(43,127,255,0.9)) drop-shadow(0 0 32px rgba(43,127,255,0.5));
    width: 140px;
    height: 140px;
    flex-shrink: 0;
  }

  .text-block {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .wordmark {
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -3px;
    line-height: 1;
  }
  .wordmark .intra { color: #fff; }
  .wordmark .claw  { color: #2B7FFF; text-shadow: 0 0 25px rgba(43,127,255,0.7); }

  .tagline {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
  .tagline .accent { color: #3DDC84; }

  /* Divider */
  .divider {
    position: absolute;
    left: 50%;
    top: 60px;
    bottom: 60px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(43,127,255,0.3) 30%, rgba(43,127,255,0.3) 70%, transparent);
  }

  /* Right — feature grid */
  .right {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 620px;
  }

  .feat {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(43,127,255,0.15);
    background: rgba(43,127,255,0.05);
    backdrop-filter: blur(4px);
  }
  .feat.green {
    border-color: rgba(61,220,132,0.2);
    background: rgba(61,220,132,0.05);
  }
  .feat-icon { font-size: 18px; flex-shrink: 0; }
  .feat-text {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.2px;
  }

  /* Bottom badge */
  .badge {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 24px;
    border-radius: 40px;
    border: 1px solid rgba(43,127,255,0.4);
    background: rgba(43,127,255,0.1);
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-glow"></div>
  <div class="lines"></div>

  <!-- LEFT -->
  <div class="left">
    <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="cg" x1="0%" y1="100%" x2="60%" y2="0%">
    <stop offset="0%" stop-color="#0e3d9e"/>
    <stop offset="40%" stop-color="#2B7FFF"/>
    <stop offset="100%" stop-color="#7ec4ff"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="outer"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<circle cx="100" cy="105" r="75" fill="rgba(43,127,255,0.09)" filter="url(#outer)"/>
<path d="M 95 170 C 82 165, 48 140, 38 90 C 32 60, 44 36, 56 38 C 68 40, 76 68, 80 100 C 84 132, 90 158, 95 170 Z" fill="url(#cg)" filter="url(#glow)"/>
<path d="M 98 172 C 90 162, 76 132, 78 90 C 80 58, 92 36, 104 38 C 116 40, 118 66, 114 96 C 110 128, 104 158, 98 172 Z" fill="url(#cg)" filter="url(#glow)" opacity="0.97"/>
<path d="M 104 172 C 108 160, 120 130, 128 94 C 136 60, 142 38, 154 40 C 166 42, 164 66, 156 94 C 148 122, 134 155, 104 172 Z" fill="url(#cg)" filter="url(#glow)" opacity="0.92"/>
<path d="M 112 168 C 124 152, 148 120, 162 86 C 170 62, 170 44, 180 48 C 190 52, 184 76, 174 102 C 162 130, 144 155, 112 168 Z" fill="url(#cg)" filter="url(#glow)" opacity="0.78"/>
<ellipse cx="103" cy="162" rx="66" ry="42" fill="#06091d" transform="rotate(-5 103 162)"/>
<ellipse cx="103" cy="162" rx="58" ry="35" fill="#04071588" transform="rotate(-5 103 162)"/>
<path d="M72 168 L87 152 L102 168" stroke="#3DDC84" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
<path d="M90 172 L106 155 L122 172" stroke="#3DDC84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
<path d="M68 160 L81 147 L94 160" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
</svg>
    <div class="text-block">
      <div class="wordmark"><span class="intra">intra</span><span class="claw">Claw</span></div>
      <div class="tagline">Think. <span class="accent">Act.</span> Automate.</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- RIGHT -->
  <div class="right">
    <div class="feat"><span class="feat-icon">⚡</span><span class="feat-text">Autonomous AI Agent</span></div>
    <div class="feat green"><span class="feat-icon">🧠</span><span class="feat-text">Graph + Vector Memory</span></div>
    <div class="feat"><span class="feat-icon">📅</span><span class="feat-text">Calendar &amp; Email</span></div>
    <div class="feat"><span class="feat-icon">💬</span><span class="feat-text">Slack · Discord · WhatsApp</span></div>
    <div class="feat green"><span class="feat-icon">🔒</span><span class="feat-text">2FA · OAuth · SAML SSO</span></div>
    <div class="feat"><span class="feat-icon">👁️</span><span class="feat-text">Vision + CoT Streaming</span></div>
    <div class="feat"><span class="feat-icon">🖥️</span><span class="feat-text">Code Sandbox + Rollback</span></div>
    <div class="feat green"><span class="feat-icon">💳</span><span class="feat-text">Stripe · GDPR Ready</span></div>
  </div>

  <div class="badge">Personal AI Platform · Self-hosted · TypeScript · 0 TS Errors</div>
</div>
</body>
</html>
