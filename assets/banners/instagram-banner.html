<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #050508;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Background */
  .bg-radial {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(43,127,255,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 80%, rgba(61,220,132,0.07) 0%, transparent 50%);
  }

  /* Grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(43,127,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(43,127,255,0.06) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* Corner accents */
  .corner { position: absolute; width: 60px; height: 60px; }
  .corner.tl { top: 30px; left: 30px; border-top: 2px solid rgba(43,127,255,0.5); border-left: 2px solid rgba(43,127,255,0.5); }
  .corner.tr { top: 30px; right: 30px; border-top: 2px solid rgba(43,127,255,0.5); border-right: 2px solid rgba(43,127,255,0.5); }
  .corner.bl { bottom: 30px; left: 30px; border-bottom: 2px solid rgba(43,127,255,0.5); border-left: 2px solid rgba(43,127,255,0.5); }
  .corner.br { bottom: 30px; right: 30px; border-bottom: 2px solid rgba(43,127,255,0.5); border-right: 2px solid rgba(43,127,255,0.5); }

  /* Logo center */
  .hero {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    margin-top: -40px;
  }

  .claw-svg {
    filter:
      drop-shadow(0 0 30px rgba(43,127,255,0.9))
      drop-shadow(0 0 60px rgba(43,127,255,0.5))
      drop-shadow(0 0 90px rgba(43,127,255,0.2));
    width: 200px;
    height: 200px;
  }

  .wordmark {
    font-size: 108px;
    font-weight: 800;
    letter-spacing: -4px;
    line-height: 1;
    text-align: center;
  }
  .wordmark .intra { color: #fff; }
  .wordmark .claw  {
    color: #2B7FFF;
    text-shadow: 0 0 40px rgba(43,127,255,0.7), 0 0 80px rgba(43,127,255,0.3);
  }

  .tagline {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    text-align: center;
  }
  .tagline .accent { color: #3DDC84; text-shadow: 0 0 15px rgba(61,220,132,0.5); }

  /* Feature row */
  .features {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 12px;
    margin-top: 48px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 60px;
  }

  .feat {
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid rgba(43,127,255,0.25);
    background: rgba(43,127,255,0.08);
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .feat.g {
    border-color: rgba(61,220,132,0.3);
    background: rgba(61,220,132,0.08);
    color: rgba(61,220,132,0.9);
  }

  /* Bottom stats */
  .stats {
    position: absolute;
    z-index: 2;
    bottom: 70px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-around;
    border-top: 1px solid rgba(43,127,255,0.12);
    padding-top: 28px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .stat-num {
    font-size: 36px;
    font-weight: 800;
    color: #2B7FFF;
    letter-spacing: -1px;
    text-shadow: 0 0 20px rgba(43,127,255,0.5);
  }
  .stat-lbl {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-align: center;
  }

  /* Scan */
  .scan {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-radial"></div>
  <div class="grid"></div>
  <div class="scan"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="hero">
    <svg width="320" height="320" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="cg" x1="0%" y1="100%" x2="60%" y2="0%">
    <stop offset="0%" stop-color="#0e3d9e"/>
    <stop offset="40%" stop-color="#2B7FFF"/>
    <stop offset="100%" stop-color="#7ec4ff"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="outer"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<circle cx="100" cy="105" r="75" fill="rgba(43,127,255,0.09)" filter="url(#outer)"/>
<path d="M 95 170 C 82 165, 48 140, 38 90 C 32 60, 44 36, 56 38 C 68 40, 76 68, 80 100 C 84 132, 90 158, 95 170 Z" fill="url(#cg)" filter="url(#glow)"/>
<path d="M 98 172 C 90 162, 76 132, 78 90 C 80 58, 92 36, 104 38 C 116 40, 118 66, 114 96 C 110 128, 104 158, 98 172 Z" fill="url(#cg)" filter="url(#glow)" opacity="0.97"/>
<path d="M 104 172 C 108 160, 120 130, 128 94 C 136 60, 142 38, 154 40 C 166 42, 164 66, 156 94 C 148 122, 134 155, 104 172 Z" fill="url(#cg)" filter="url(#glow)" opacity="0.92"/>
<path d="M 112 168 C 124 152, 148 120, 162 86 C 170 62, 170 44, 180 48 C 190 52, 184 76, 174 102 C 162 130, 144 155, 112 168 Z" fill="url(#cg)" filter="url(#glow)" opacity="0.78"/>
<ellipse cx="103" cy="162" rx="66" ry="42" fill="#06091d" transform="rotate(-5 103 162)"/>
<ellipse cx="103" cy="162" rx="58" ry="35" fill="#04071588" transform="rotate(-5 103 162)"/>
<path d="M72 168 L87 152 L102 168" stroke="#3DDC84" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
<path d="M90 172 L106 155 L122 172" stroke="#3DDC84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
<path d="M68 160 L81 147 L94 160" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
</svg>

    <div class="wordmark"><span class="intra">intra</span><span class="claw">Claw</span></div>
    <div class="tagline">Think. <span class="accent">Act.</span> Automate.</div>
  </div>

  <div class="features">
    <div class="feat">⚡ Autonomous Agent</div>
    <div class="feat g">🧠 Graph Memory</div>
    <div class="feat">📅 Calendar + Email</div>
    <div class="feat g">🔒 2FA · SAML · OAuth</div>
    <div class="feat">👁️ Vision + CoT</div>
    <div class="feat">💬 Slack · Discord · WA</div>
    <div class="feat g">💳 Stripe · GDPR</div>
    <div class="feat">🖥️ Code Sandbox</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num">164</div><div class="stat-lbl">TS Files</div></div>
    <div class="stat"><div class="stat-num">~90</div><div class="stat-lbl">API Endpoints</div></div>
    <div class="stat"><div class="stat-num">20</div><div class="stat-lbl">Dashboard Pages</div></div>
    <div class="stat"><div class="stat-num">0</div><div class="stat-lbl">TS Errors</div></div>
  </div>
</div>
</body>
</html>
