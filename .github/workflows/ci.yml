name: CI

on:
  push:
    branches: [main, ouroboros-evolution]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript strict typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  smoke-tests:
    name: Smoke tests (security + executor + evolution)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:smoke
